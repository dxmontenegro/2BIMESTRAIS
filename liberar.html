<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Fiscal - EEMTI Dragão do Mar</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #8b5cf6;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        .topo button {
            background: #334155;
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 8px;
            font-weight: bold;
        }

        #reader {
            width: 100%;
            height: 50vh; 
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Força o vídeo a ocupar todo o container */
        #reader video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #reader canvas.drawingBuffer {
            display: none; /* Esconde as caixas de detecção sobre o vídeo para ficar mais limpo */
        }

        .mira {
            position: absolute;
            width: 260px;
            height: 160px;
            border: 3px solid var(--primary);
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .mira::after {
            content: "";
            position: absolute;
            top: 50%; left: 5%;
            width: 90%; height: 2px;
            background: red;
            box-shadow: 0 0 12px red;
            animation: scanLine 2s infinite ease-in-out;
        }

        @keyframes scanLine {
            0%, 100% { transform: translateY(-50px); opacity: 0.3; }
            50% { transform: translateY(50px); opacity: 1; }
        }

        .container {
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            margin-top: 10px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-acao {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
        }

        .info {
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 14px;
            flex-grow: 1;
            overflow-y: auto;
            border-left: 4px solid var(--primary);
        }

        .pc-destaque {
            font-size: 32px;
            font-weight: 900;
            color: var(--success);
            display: block;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="topo">
        <button onclick="voltar()">⬅ VOLTAR</button>
        <div style="font-weight: bold; color: var(--primary);">MODO FISCAL</div>
    </div>

    <div id="reader">
        <div class="mira"></div>
    </div>

    <div class="container">
        <button class="btn-acao" onclick="reiniciar()">🔄 NOVA LEITURA</button>
        
        <div class="info" id="info">
            <p id="msgStatus" style="text-align:center; color:#94a3b8; margin:0;">Aguardando leitura do código...</p>
        </div>
    </div>

<script>
const SUPABASE_URL = "https://fwemutmkbvnriqxxufhx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function voltar(){ window.location.href = "painel.html" }

async function liberar(codigo){
    codigo = codigo.trim();
    if (navigator.vibrate) navigator.vibrate(100);

    document.getElementById("info").innerHTML = `<p style="text-align:center;">Buscando: <b>${codigo}</b>...</p>`;

    const { data: aluno, error } = await client.from("provas_alunos").select("*").eq("codigo_barras", codigo).single();

    if(error || !aluno){
        document.getElementById("info").innerHTML = `<p style="color:#f87171; text-align:center;"><b>Aluno não encontrado</b></p>`;
        return;
    }

    const ano = aluno.turma.charAt(0);
    const { data: pcs } = await client.from("provas_terminais").select("*").eq("status", "livre").eq("ano", parseInt(ano)).limit(1);

    if(!pcs || pcs.length === 0){
        document.getElementById("info").innerHTML = `<p style="text-align:center;"><b>${aluno.nome}</b><br><span style="color:#fbbf24;">⚠️ Nenhum PC livre</span></p>`;
        return;
    }

    const pc = pcs[0];
    await client.from("provas_terminais").update({ status: "ocupado", aluno_id: aluno.id }).eq("id", pc.id);

    document.getElementById("info").innerHTML = `
        <div style="text-align:center">
            <p style="margin:0; color:#94a3b8;">ALUNO LIBERADO:</p>
            <strong style="font-size:18px">${aluno.nome}</strong>
            <p style="margin:10px 0 0 0; color:#94a3b8;">VÁ PARA O:</p>
            <span class="pc-destaque">${pc.nome}</span>
        </div>
    `;
}

// FUNÇÃO DE INICIALIZAÇÃO ROBUSTA
function iniciar(){
    Quagga.init({
        inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#reader'),
            constraints: {
                facingMode: "environment"
            }
        },
        decoder: {
            readers: ["code_128_reader", "ean_reader"],
            multiple: false
        },
        locate: true
    }, function(err) {
        if (err) { 
            console.error(err); 
            document.getElementById("msgStatus").innerText = "Erro ao acessar câmera.";
            return; 
        }
        Quagga.start();
    });
}

Quagga.onDetected(function(data) {
    const codigo = data.codeResult.code;
    liberar(codigo);
    Quagga.stop();
});

// REINICIALIZAÇÃO COMPLETA
function reiniciar(){
    document.getElementById("info").innerHTML = `<p id="msgStatus" style="text-align:center; color:#94a3b8; margin:0;">Reiniciando câmera...</p>`;
    
    // Para o Quagga completamente
    Quagga.stop();

    // Limpa o conteúdo de vídeo antigo de dentro do #reader (deixando apenas a mira)
    const reader = document.querySelector('#reader');
    const videos = reader.querySelectorAll('video, canvas');
    videos.forEach(v => v.remove());

    // Reinicia do zero após um pequeno atraso para o sistema liberar a câmera
    setTimeout(() => {
        iniciar();
        document.getElementById("info").innerHTML = `<p id="msgStatus" style="text-align:center; color:#94a3b8; margin:0;">Aguardando leitura...</p>`;
    }, 300);
}

window.addEventListener('load', iniciar);
</script>

</body>
</html>
