<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Liberação de Aluno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<!-- 🔥 ÍCONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:15px;
text-align:center;
}

/* TOPO */
.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.voltar{
background:#334155;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

/* CONTAINER */
.container{
background:#1e293b;
padding:20px;
border-radius:12px;
max-width:520px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* SCANNER */
#reader{
width:100%;
max-width:420px;
height:260px;
margin:auto;
border-radius:12px;
overflow:hidden;
position:relative;
background:black;
display:flex;
align-items:center;
justify-content:center;
}

#reader video,
#reader canvas{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* BOX */
.scan-box{
position:absolute;
width:70%;
height:60%;
z-index:5;
}

.scan-box::before,
.scan-box::after{
content:"";
position:absolute;
width:40px;
height:40px;
border:3px solid #22c55e;
}

.scan-box::before{
top:0; left:0;
border-right:none;
border-bottom:none;
}

.scan-box::after{
bottom:0; right:0;
border-left:none;
border-top:none;
}

/* LASER */
#reader::after{
content:"";
position:absolute;
left:15%;
width:70%;
height:2px;
background:red;
top:50%;
animation:laser 2s infinite;
}

@keyframes laser{
0%{top:20%;}
50%{top:80%;}
100%{top:20%;}
}

/* INPUT */
input, select{
padding:10px;
margin-top:10px;
width:100%;
border-radius:6px;
border:none;
}

/* BOTÕES */
button{
padding:10px;
margin-top:10px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1d4ed8;
}

/* INFO */
.info{
margin-top:15px;
background:#0f172a;
padding:15px;
border-radius:8px;
text-align:left;
font-size:14px;
}

/* 🔻 FOOTER PADRÃO */
footer{
position:fixed;
bottom:0;
width:100%;
background:#1e293b;
padding:8px;
border-top:1px solid #334155;
font-size:13px;
}

footer p{
margin:2px;
}

</style>
</head>

<body>

<div class="topo">
<div class="voltar" onclick="voltar()">⬅ Voltar</div>
</div>

<h2>📡 Liberação de Aluno</h2>

<div class="container">

<div id="reader">
<div class="scan-box"></div>
</div>

<input id="matricula" placeholder="Digite a matrícula">
<button onclick="buscarPorMatricula()">Buscar por matrícula</button>

<div id="resultado" class="info">
Status: aguardando...
</div>

<div id="pcsArea" style="display:none;">
<select id="pcsSelect"></select>
<button onclick="liberarAluno()">LIBERAR ALUNO PARA PROVA</button>
</div>

</div>

<!-- 🔻 FOOTER PADRÃO -->
<footer>
    <p><i class="fas fa-school"></i> <b>EEMTI DRAGÃO DO MAR - L.E.I.</b></p>
    <p><i class="fas fa-code"></i> By <b>D.S.Montenegro</b> <i class="fas fa-bolt"></i></p>
</footer>

<script>

const SUPABASE_URL = "https://fwemutmkbvnriqxxufhx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let alunoAtual = null

function voltar(){
window.location.href = "painel.html"
}

// SCANNER
function iniciarScanner(){
Quagga.init({
inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#reader'),
constraints:{facingMode:"environment"}
},
decoder:{readers:["code_128_reader"]}
}, function(err){
if(err) return
Quagga.start()
})
}

Quagga.onDetected(async function(data){

const codigo = data.codeResult.code

const { data: aluno } = await client
.from("provas_alunos")
.select("*")
.eq("codigo_barras", codigo)
.single()

if(!aluno){
resultado.innerHTML = "Aluno não encontrado"
return
}

processarAluno(aluno)

})

// MATRÍCULA
async function buscarPorMatricula(){

const mat = matricula.value

const { data: aluno } = await client
.from("provas_alunos")
.select("*")
.eq("matricula", mat)
.single()

if(!aluno){
resultado.innerHTML = "Aluno não encontrado"
return
}

processarAluno(aluno)
}

// PROCESSAR
async function processarAluno(aluno){

alunoAtual = aluno

resultado.innerHTML = `
<b>Aluno:</b> ${aluno.nome}<br>
<b>Turma:</b> ${aluno.turma}
`

const ano = parseInt(aluno.turma.charAt(0))

const { data: pcs } = await client
.from("provas_terminais")
.select("*")
.eq("status","livre")
.eq("ano",ano)

if(!pcs || pcs.length === 0){
resultado.innerHTML += "<br>Sem PCs disponíveis"
return
}

pcsSelect.innerHTML=""

pcs.forEach(pc=>{
const op=document.createElement("option")
op.value=pc.id
op.text=pc.nome
pcsSelect.appendChild(op)
})

pcsArea.style.display="block"
}

// LIBERAR
async function liberarAluno(){

const pcId = pcsSelect.value

await client.from("provas_terminais")
.update({status:"ocupado", aluno_id:alunoAtual.id})
.eq("id", pcId)

// reset
alunoAtual=null
resultado.innerHTML="Status: aguardando..."
pcsArea.style.display="none"
matricula.value=""

}

iniciarScanner()

</script>

</body>
</html>
