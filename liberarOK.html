<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Scanner de Código de Barras</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

.topo{
text-align:left;
margin-bottom:15px;
}

.topo button{
background:#334155;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

#reader{
width:100%;
max-width:400px;
margin:auto;
}

.container{
background:#1e293b;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin-top:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.info{
margin-top:15px;
background:#0f172a;
padding:15px;
border-radius:8px;
text-align:left;
}

</style>
</head>

<body>

<div class="topo">
<button onclick="voltar()">⬅ Voltar</button>
</div>

<h2>📡 Scanner de Código de Barras</h2>

<div class="container">

<div id="reader"></div>

<button onclick="reiniciar()">🔄 Nova Leitura</button>

<div class="info" id="info">
<p><b>Status:</b> Aguardando leitura...</p>
</div>

</div>

<script>

const SUPABASE_URL = "https://fwemutmkbvnriqxxufhx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function voltar(){
window.location.href = "painel.html"
}

async function liberar(codigo){

codigo = codigo.trim()

document.getElementById("info").innerHTML =
`<p><b>Código lido:</b> ${codigo}</p><p>Buscando aluno...</p>`

// 🔎 buscar aluno
const { data: aluno, error } = await client
.from("provas_alunos")
.select("*")
.eq("codigo_barras", codigo)
.single()

if(error || !aluno){
document.getElementById("info").innerHTML =
`<p><b>Código:</b> ${codigo}</p>
<p style="color:red;"><b>Aluno não encontrado</b></p>`
return
}

// 🎯 descobrir ANO
const ano = aluno.turma.charAt(0)

// 🖥️ buscar PC LIVRE do mesmo ano
const { data: pcs } = await client
.from("provas_terminais")
.select("*")
.eq("status", "livre")
.eq("ano", parseInt(ano))
.limit(1)

if(!pcs || pcs.length === 0){
document.getElementById("info").innerHTML =
`<p><b>${aluno.nome}</b></p>
<p style="color:orange;">Nenhum PC disponível para ${ano}º ano</p>`
return
}

const pc = pcs[0]

// 🔥 ocupar PC
await client
.from("provas_terminais")
.update({
status: "ocupado",
aluno_id: aluno.id
})
.eq("id", pc.id)

// ✅ mostrar resultado
document.getElementById("info").innerHTML = `
<p><b>Aluno:</b> ${aluno.nome}</p>
<p><b>Turma:</b> ${aluno.turma}</p>
<p><b>PC:</b> ${pc.nome}</p>
<p style="color:lightgreen;"><b>Direcionar aluno para o computador</b></p>
`

}

// 📷 INICIAR SCANNER
function iniciar(){

Quagga.init({
inputStream: {
name: "Live",
type: "LiveStream",
target: document.querySelector('#reader'),
constraints: {
facingMode: "environment"
}
},
decoder: {
readers: ["code_128_reader"]
}
}, function(err) {

if (err) {
console.log(err)
return
}

Quagga.start()

})

}

// 🔍 DETECÇÃO
Quagga.onDetected(function(data) {

const codigo = data.codeResult.code

liberar(codigo)

// para leitura automática
Quagga.stop()

})

// 🔄 BOTÃO REFRESH
function reiniciar(){
document.getElementById("info").innerHTML =
"<p><b>Status:</b> Aguardando leitura...</p>"

Quagga.start()
}

// iniciar ao abrir
iniciar()

</script>

</body>
</html>
