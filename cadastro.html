<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Aluno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 10px;
        margin: 0;
    }

    .topo {
        text-align: left;
        margin-bottom: 15px;
        padding: 10px;
    }

    .topo button {
        background: #334155;
        border: none;
        padding: 10px 15px;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .container {
        background: #1e293b;
        padding: 25px 15px;
        border-radius: 12px;
        width: 95%;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    h2 { margin-top: 0; font-size: 1.5rem; }

    input, select {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 8px;
        border: 2px solid #334155;
        background: #0f172a;
        color: white;
        box-sizing: border-box; /* Garante que o padding não aumente a largura */
        font-size: 1rem;
    }

    input:focus, select:focus {
        border-color: #8b5cf6;
        outline: none;
    }

    button {
        padding: 15px;
        width: 100%;
        background: #8b5cf6;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        margin-top: 10px;
        font-size: 1rem;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.98);
        background: #7c3aed;
    }

    #barcode {
        margin-top: 15px;
        background: white;
        padding: 10px;
        border-radius: 8px;
        max-width: 100%; /* Ajusta o código de barras ao celular */
        height: auto;
    }

    #msg {
        margin-top: 15px;
        font-weight: bold;
        min-height: 20px;
    }
</style>

</head>

<body>

<div class="topo">
    <button onclick="voltar()">⬅ Voltar</button>
</div>

<h2>Cadastro de Aluno</h2>

<div class="container">
    <input id="matricula" type="number" pattern="\[0-9]*" placeholder="Matrícula">
    <input id="nome" placeholder="Nome Completo">
    <input id="email" type="email" placeholder="Email">

    <select id="turma">
        <option value="" disabled selected>Selecione a Turma</option>
        <option>1A</option>
        <option>1B</option>
        <option>1C</option>
        <option>1D</option>
        <option>2A</option>
        <option>2B</option>
        <option>2C</option>
        <option>2D</option>
        <option>3A</option>
        <option>3B</option>
        <option>3C</option>
    </select>

    <button onclick="gerarCodigo()">Gerar Código de Barras</button>

    <div style="overflow-x: auto; margin-top: 10px;">
        <svg id="barcode"></svg>
    </div>

    <button onclick="salvar()" style="background: #10b981;">Salvar Aluno</button>

    <p id="msg"></p>
</div>

<script>
    const SUPABASE_URL = "https://fwemutmkbvnriqxxufhx.supabase.co"
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function voltar(){
        window.location.href = "painel.html"
    }

    function gerarCodigo(){
        const matricula = document.getElementById("matricula").value
        if(!matricula){
            alert("Digite a matrícula primeiro")
            return
        }

        const codigo = "ALUNO-" + matricula
        JsBarcode("#barcode", codigo, {
            format: "CODE128",
            displayValue: true,
            width: 2,
            height: 60
        })
    }

    async function salvar(){
        const matricula = document.getElementById("matricula").value
        const nome = document.getElementById("nome").value
        const email = document.getElementById("email").value
        const turma = document.getElementById("turma").value
        const msg = document.getElementById("msg");

        if(!matricula || !nome || !turma){
            msg.innerText = "⚠️ Preencha os campos obrigatórios";
            msg.style.color = "#f59e0b";
            return
        }

        msg.innerText = "Salvando...";
        msg.style.color = "white";

        const codigo = "ALUNO-" + matricula

        const { error } = await client
            .from("provas_alunos")
            .insert([{ matricula, nome, email, turma, codigo_barras: codigo }])

        if(error){
            msg.innerText = "❌ " + error.message;
            msg.style.color = "#ef4444";
        } else {
            msg.innerText = "✅ Aluno cadastrado com sucesso!";
            msg.style.color = "#10b981";

            // Limpar campos
            document.getElementById("matricula").value = ""
            document.getElementById("nome").value = ""
            document.getElementById("email").value = ""
            document.getElementById("turma").value = ""
            document.getElementById("barcode").innerHTML = ""
        }
    }
</script>

</body>
</html>
