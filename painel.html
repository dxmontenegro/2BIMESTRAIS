<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel - EEMTI Dragão do Mar</title>
    <link rel="icon" type="image/png" href="imagem1.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Topo */
        .header-painel {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .logo-main {
            width: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4));
        }

        h2 { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
        .subtitle { color: var(--primary); font-weight: 600; font-size: 14px; text-transform: uppercase; margin-top: 5px; }

        /* Grid de Cartões */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            flex-grow: 1;
        }

        .card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-8px);
            background: #243049;
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .card i {
            font-size: 32px;
            color: var(--primary);
            transition: 0.3s;
        }

        .card:hover i {
            transform: scale(1.1);
            color: white;
        }

        .card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        /* Botão Sair Especial */
        .btn-logout {
            margin: 40px auto 0 auto;
            background: rgba(248, 113, 113, 0.1);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.2);
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        /* Rodapé */
        footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-dim);
            font-size: 11px;
            padding-bottom: 10px;
        }
        footer b { color: var(--text); }
        footer i { color: var(--primary); margin: 0 3px; }

        /* Mobile */
        @media (max-width: 480px) {
            .container { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { padding: 20px 10px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-painel">
        <img src="imagem1.png" class="logo-main">
        <h2>EEMTI DRAGÃO DO MAR</h2>
        <p class="subtitle">Sistema de Avaliações</p>
    </div>

    <div class="container">

        </div>
        
        <div class="card" onclick="ir('agenda.html')">
            <i class="fas fa-calendar-alt"></i>
            <h3>AGENDA</h3>
        </div>

        <div class="card" onclick="ir('liberar.html')">
            <i class="fas fa-qrcode"></i>
            <h3>LIBERAR</h3>
        </div>

        <div class="card" onclick="ir('mapa.html')">
            <i class="fas fa-desktop"></i>
            <h3>MAPA LAB</h3>
        </div>

        <div class="card" onclick="ir('relatorio.html')">
            <i class="fas fa-file-invoice"></i>
            <h3>RELATÓRIOS</h3>
        </div>

        <div class="card" onclick="ir('limpar.html')">

    <button class="btn-logout" onclick="sair()">

    <footer>

        <p><i class="fas fa-code"></i> By <b>D.S.Montenegro</b> <i class="fas fa-bolt"></i></p>
    </footer>
