<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal do Aluno - EEMTI Dragão do Mar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --accent: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .topo {
            position: fixed; top: 0; width: 100%; height: 95px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000; border-bottom: 1px solid var(--border);
        }

        .esquerda { display: flex; gap: 15px; align-items: center; flex: 1; }
        .logo { height: 60px; width: 60px; border-radius: 12px; border: 2px solid var(--border); }

        /* PAINEL REORGANIZADO (6 COLUNAS) */
        #painelAluno {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(6, auto);
            gap: 8px 20px;
            font-size: 11px;
            align-items: center;
        }

        .painel-row { display: flex; flex-direction: column; }
        .label { color: var(--text-dim); text-transform: uppercase; font-size: 9px; font-weight: 700; margin-bottom: 2px; }
        .valor { color: #fff; font-weight: 600; font-size: 12px; white-space: nowrap; }

        .status-badge {
            padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 800;
        }
        .status-livre { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-ocupado { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* CONTROLES E TIMER */
        .controles { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; min-width: 220px; }
        
        #fullscreenIndicator {
            background: var(--accent); color: white; padding: 2px 10px;
            border-radius: 6px; font-size: 9px; font-weight: 800;
            display: none; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .timer-row { display: flex; align-items: center; gap: 12px; }
        #timer { font-family: monospace; font-size: 28px; font-weight: 800; color: var(--accent); }

        button { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; transition: 0.2s; }
        .btn-outline:hover { background: var(--border); }

        /* ÁREA MANUAL - FOCO DO LEITOR */
        #manualArea { 
            position: absolute; top: 100px; right: 20px;
            background: #1e293b; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--primary);
            display: none; flex-direction: column; gap: 8px; z-index: 2100;
        }
        input { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: white; width: 220px; }

        /* IFRAME */
        .conteudo { position: fixed; top: 95px; bottom: 35px; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .footer {
            position: fixed; bottom: 0; width: 100%; height: 35px;
            background: #0f172a; font-size: 11px; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 25px;
            border-top: 1px solid var(--border); color: var(--text-dim);
        }

        /* VIOLAÇÃO */
        .violation-alert {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        .alert-card { background: #1e1e1e; border: 2px solid var(--danger); padding: 30px; border-radius: 20px; text-align: center; }
        .progress-bar { height: 5px; background: var(--danger); width: 0%; transition: width 0.1s linear; margin: 15px 0; }
    </style>
</head>

<body>

<div class="topo">
    <div class="esquerda">
        <img src="imagem1.png" class="logo" alt="Logo">
        <div id="painelAluno"></div>
    </div>

    <div class="controles">
        <div id="fullscreenIndicator">🖥️ AMBIENTE PROTEGIDO ATIVO</div>
        <div class="timer-row">
            <div id="timer">40:00</div>
            <div class="botoes-acao">
                <button class="btn-outline" onclick="alternarModo()">⚙️</button>
                <button class="btn-outline" onclick="nova()">🔄</button>
            </div>
        </div>
    </div>

    <div id="manualArea">
        <input id="matricula" placeholder="Aguardando Leitura..." onkeydown="if(event.key==='Enter'){event.preventDefault(); iniciarManual();}">
        <button class="btn-primary" onclick="iniciarManual()">ACESSAR PROVA</button>
    </div>
</div>

<div class="conteudo"><iframe id="frame"></iframe></div>

<div class="footer">
    <div>🏫 EEMTI DRAGÃO DO MAR</div>
    <div>PC: <strong id="pcNome" style="color: var(--primary-light)">-</strong></div>
    <div>⚡ By D.S.Montenegro</div>
</div>

<div class="violation-alert" id="violationAlert">
    <div class="alert-card">
        <h1 style="color: var(--danger); font-size: 40px;">⚠️</h1>
        <h3 style="margin: 10px 0">VIOLAÇÃO DETECTADA</h3>
        <div style="width: 200px; background: #333; border-radius: 3px;"><div class="progress-bar" id="progressFill"></div></div>
        <div style="font-weight: bold;"><span id="countdown">5</span>s</div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://fwemutmkbvnriqxxufhx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const params = new URLSearchParams(window.location.search)
const nomePC = params.get("pc") || "PC1"
document.getElementById("pcNome").textContent = nomePC

const provas = {
    DMAR1MAT1:"https://docs.google.com/forms/d/e/1FAIpQLSel6_ekoikgL-WvTB0yC59m77YOnn0WG8qYxMeGYHw3BGXHag/viewform?embedded=true",
    DMAR1NAT1:"https://docs.google.com/forms/d/e/1FAIpQLSf87T1wOkt_G9A5oO3qS2G3Na-WRX6opum86wnIMjPvzJfLKA/viewform?embedded=true",
    DMAR1HUM1:"https://docs.google.com/forms/d/e/1FAIpQLSdHh1Ldlrgu6swJ1aTymMJCVc5a-qmT4BPDMHd90e0F4dZjww/viewform?embedded=true",
    DMAR1LIN1:"https://docs.google.com/forms/d/e/1FAIpQLSdW-1Ovew57ft-ZyANhOY9rCW_33RcefgmBhBKKf8Cbqq1SGw/viewform?embedded=true",
    DMAR2MAT1:"https://docs.google.com/forms/d/e/1FAIpQLSdwTbM4mBrO8Kmu__Rlv-SNo32NJw9QoIJtnR-lTv1S_lZTPg/viewform?embedded=true",
    DMAR2LIN1:"https://docs.google.com/forms/d/e/1FAIpQLScWB4GIyXL2gImCdlWnJDuu02Cpuz3bseQAMxsaGD4EUVb9zg/viewform?embedded=true",
    DMAR3MAT1:"https://docs.google.com/forms/d/e/1FAIpQLSfHB1pODQjI2WZbInqlHdLk1ZVbcFSBgXi3gKn50j9TPWSUlw/viewform?embedded=true"
}

function inicial() {
    document.getElementById("painelAluno").innerHTML = `
        <div class="painel-row"><span class="label">Aluno</span><span class="valor">-</span></div>
        <div class="painel-row"><span class="label">E-mail</span><span class="valor">-</span></div>
        <div class="painel-row"><span class="label">Série</span><span class="valor">-</span></div>
        <div class="painel-row"><span class="label">Matrícula</span><span class="valor">-</span></div>
        <div class="painel-row"><span class="label">Prova</span><span class="valor">-</span></div>
        <div class="painel-row"><span class="label">Status</span><span class="status-badge status-livre">LIVRE</span></div>`;
}

async function verificarStatus() {
    const { data } = await client.from("provas_terminais").select("status, aluno_id").eq("nome", nomePC).single()
    if (data?.status === "ocupado" && data.aluno_id) {
        const { data: aluno } = await client.from("provas_alunos").select("*").eq("id", data.aluno_id).single()
        if (aluno) carregarAluno(aluno, "Sincronizado")
    }
}

let tempo = 2400, intervalo;
function iniciarTimer(){
    tempo = 2400; clearInterval(intervalo);
    intervalo = setInterval(() => {
        tempo--;
        let min = Math.floor(tempo/60), seg = tempo%60;
        document.getElementById("timer").innerText = String(min).padStart(2,'0')+":"+String(seg).padStart(2,'0');
    }, 1000);
}

function alternarModo(){
    const area = document.getElementById("manualArea");
    const input = document.getElementById("matricula");
    area.style.display = area.style.display === "none" ? "flex" : "none";
    if(area.style.display === "flex") setTimeout(() => input.focus(), 200);
}

async function nova(){
    await client.from("provas_terminais").update({status:"livre", aluno_id:null}).eq("nome", nomePC);
    location.reload();
}

async function iniciarManual(){
    const input = document.getElementById("matricula");
    const mat = input.value.trim();
    if(!mat) return;

    const { data: aluno } = await client.from("provas_alunos").select("*").eq("matricula", mat).single();
    if(!aluno){ alert("Aluno não encontrado"); input.value=""; return; }

    const { data: agendas } = await client.from("provas_agenda").select("*");
    const hoje = new Date().toLocaleDateString('en-CA');
    const agenda = agendas.find(a => a.data.includes(hoje));
    if(!agenda){ alert("Sem prova agendada"); return; }

    const codigo = "DMAR" + aluno.turma.charAt(0) + agenda.area;
    const link = provas[codigo];
    
    // ATUALIZAÇÃO E CARREGAMENTO DO FRAME
    await client.from("provas_terminais").update({status:"ocupado", aluno_id:aluno.id}).eq("nome", nomePC);
    carregarAluno(aluno, agenda.area);
    iniciarTimer();
    
    document.getElementById("frame").src = link;
    input.value = "";
    alternarModo();
    setTimeout(entrarFullscreen, 800);
}

function carregarAluno(aluno, area) {
    document.getElementById("painelAluno").innerHTML = `
        <div class="painel-row"><span class="label">Aluno</span><span class="valor">${aluno.nome}</span></div>
        <div class="painel-row"><span class="label">E-mail</span><span class="valor">${aluno.email || '-'}</span></div>
        <div class="painel-row"><span class="label">Série</span><span class="valor">${aluno.turma}</span></div>
        <div class="painel-row"><span class="label">Matrícula</span><span class="valor">${aluno.matricula}</span></div>
        <div class="painel-row"><span class="label">Prova</span><span class="valor">${area}</span></div>
        <div class="painel-row"><span class="label">Status</span><span class="status-badge status-ocupado">OCUPADO</span></div>`;
}

async function entrarFullscreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    document.getElementById("fullscreenIndicator").style.display = "block";
}

function mostrarViolacao() {
    const alert = document.getElementById("violationAlert");
    if(alert.style.display === "flex") return;
    alert.style.display = "flex";
    let tempoV = 5, progresso = 0;
    const pInt = setInterval(() => {
        progresso += 2; document.getElementById("progressFill").style.width = progresso + "%";
        if (progresso >= 100) { clearInterval(pInt); alert.style.display = "none"; entrarFullscreen(); }
    }, 100);
    const cInt = setInterval(() => {
        tempoV--; document.getElementById("countdown").textContent = Math.max(0, tempoV);
        if(tempoV <= 0) clearInterval(cInt);
    }, 1000);
}

document.addEventListener('fullscreenchange', () => !document.fullscreenElement && mostrarViolacao());
document.addEventListener('visibilitychange', () => document.visibilityState === 'hidden' && mostrarViolacao());
document.addEventListener('keydown', e => {
    if (e.key === 'F11' || e.key === 'Escape' || (e.ctrlKey && e.key === 'n')) { e.preventDefault(); mostrarViolacao(); }
});

window.addEventListener('load', () => { inicial(); verificarStatus(); });
</script>
</body>
</html>
