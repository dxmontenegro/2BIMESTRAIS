<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Relatório de Alunos</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

.topo{
text-align:left;
margin-bottom:15px;
}

.topo button{
background:#334155;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

.container{
background:#1e293b;
padding:20px;
border-radius:10px;
width:95%;
margin:auto;
}

select{
padding:10px;
margin:10px;
border-radius:6px;
}

button{
padding:10px;
margin:10px;
background:#8b5cf6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th, td{
padding:10px;
border-bottom:1px solid #334155;
}

.status-ok{
color:#22c55e;
font-weight:bold;
}

.status-no{
color:#ef4444;
font-weight:bold;
}

#resumo{
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<div class="topo">
<button onclick="voltar()">⬅ Voltar</button>
</div>

<h2>📊 Relatório de Alunos</h2>

<div class="container">

<select id="turma" onchange="carregar()">
<option value="">Selecione a turma</option>
<option>1A</option>
<option>1B</option>
<option>1C</option>
<option>1D</option>
<option>2A</option>
<option>2B</option>
<option>2C</option>
<option>2D</option>
<option>3A</option>
<option>3B</option>
<option>3C</option>
</select>

<button onclick="gerarPDF()">📄 Gerar PDF da Turma</button>

<div id="resumo">
Total: <span id="total">0</span> |
✔ Fez: <span id="fez">0</span> |
❌ Não fez: <span id="nao">0</span>
</div>

<table id="tabela">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const SUPABASE_URL = "https://fwemutmkbvnriqxxufhx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// 🔙 VOLTAR
function voltar(){
window.location.href = "painel.html"
}

// 📊 CARREGAR DADOS
async function carregar(){

const turma = document.getElementById("turma").value

if(!turma) return

const { data, error } = await client
.from("provas_alunos")
.select("*")
.eq("turma", turma)

if(error){
alert("ERRO REAL: " + error.message)
console.log(error)
return
}

const tbody = document.querySelector("#tabela tbody")
tbody.innerHTML = ""

let total = 0
let fez = 0
let nao = 0

data.forEach(aluno => {

total++

if(aluno.fez_prova){
fez++
}else{
nao++
}

const status = aluno.fez_prova
? `<span class="status-ok">✔ Fez</span>`
: `<span class="status-no">❌ Não fez</span>`

const linha = `
<tr>
<td>${aluno.nome}</td>
<td>${aluno.email || "-"}</td>
<td>${status}</td>
</tr>
`

tbody.innerHTML += linha

})

document.getElementById("total").innerText = total
document.getElementById("fez").innerText = fez
document.getElementById("nao").innerText = nao

}

// 📄 GERAR PDF
async function gerarPDF(){

const turma = document.getElementById("turma").value

if(!turma){
alert("Selecione uma turma")
return
}

const { data, error } = await client
.from("provas_alunos")
.select("*")
.eq("turma", turma)

if(error){
alert("Erro PDF: " + error.message)
return
}

if(!data || data.length === 0){
alert("Nenhum aluno")
return
}

const { jsPDF } = window.jspdf
const doc = new jsPDF()

let y = 10
let count = 0

data.forEach(aluno => {

doc.setFontSize(11)
doc.text("Nome: " + aluno.nome, 10, y)

doc.setFontSize(9)
doc.text("Email: " + (aluno.email || "-"), 10, y+6)
doc.text("Código: " + aluno.codigo_barras, 10, y+11)

const canvas = document.createElement("canvas")
JsBarcode(canvas, aluno.codigo_barras, { displayValue: false })

const img = canvas.toDataURL("image/png")

doc.addImage(img, "PNG", 120, y-5, 70, 15)

y += 30
count++

if(count === 10){
doc.addPage()
y = 10
count = 0
}

})

doc.save("turma_" + turma + ".pdf")

}

</script>

</body>
</html>
