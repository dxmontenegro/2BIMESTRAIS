<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Lab</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#fff;
--free-1:#22c55e;
--free-2:#eab308;
--occupied:#ef4444;
--border:#334155;
}

body{
background:radial-gradient(circle at top right,#1e293b,#0f172a);
color:white;
font-family:-apple-system, system-ui, sans-serif;
padding:15px;
margin:0;
}

/* NAV */
.nav-top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
max-width:1200px;
margin-left:auto;
margin-right:auto;
}

.btn-nav{
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
font-size:14px;
}

/* TÍTULO */
h2{
text-align:center;
margin-bottom:25px;
font-size:22px;
font-weight:800;
color:var(--text);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:18px;
max-width:1200px;
margin:auto;
padding:20px;
}

/* CARD */
.pc{
padding:20px 16px;
border-radius:20px;
text-align:center;
transition:all 0.4s;
border:2px solid var(--border);
position:relative;
background:var(--card);
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

/* LIVRE - ALTERNA VERDE/AMARELO */
.pc.livre{
animation:alternaCor 2s infinite;
}

.pc.livre:hover{
transform:scale(1.05);
box-shadow:0 8px 30px rgba(34,197,94,0.4);
border-color:var(--free-1);
}

@keyframes alternativaCor{
0%, 100%{
background:rgba(34,197,94,0.15);
border-color:var(--free-1);
box-shadow:0 0 10px rgba(34,197,94,0.3);
}
50%{
background:rgba(234,179,8,0.15);
border-color:var(--free-2);
box-shadow:0 0 10px rgba(234,179,8,0.3);
}
}

/* OCUPADO - VERMELHO ESTÁTICO */
.pc.ocupado{
background:rgba(239,68,68,0.15);
border-color:var(--occupied);
box-shadow:0 0 15px rgba(239,68,68,0.3);
opacity:0.7;
}

.pc.ocupado:hover{
border-color:#dc2626;
}

/* ÍCONE */
.pc-icon{
font-size:30px;
margin-bottom:12px;
}

.pc.livre .pc-icon{color:var(--free-1);}
.pc.ocupado .pc-icon{color:var(--occupied);}

/* STATUS */
.status{
font-size:12px;
font-weight:bold;
margin-top:10px;
padding:4px 10px;
border-radius:6px;
display:inline-block;
}

.pc.livre .status{
color:var(--free-1);
background:rgba(34,197,94,0.1);
}

.pc.ocupado .status{
color:var(--occupied);
background:rgba(239,68,68,0.1);
}

/* TEXTO */
.pc-nome{
font-weight:800;
font-size:16px;
margin-bottom:6px;
color:var(--text);
}

.pc-aluno{
font-size:13px;
margin-top:6px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
color:#94a3b8;
}

.pc-turma{
font-size:12px;
margin-top:8px;
font-weight:600;
opacity:0.8;
color:#cbd5e1;
}

/* 🔥 X OCUPADO */
.pc-x{
position:absolute;
top:10px;
right:12px;
font-size:20px;
color:var(--occupied);
display:none;
}

.pc.ocupado .pc-x{
display:block;
}

/* FOOTER */
footer{
text-align:center;
margin-top:40px;
font-size:12px;
color:#94a3b8;
max-width:1200px;
margin-left:auto;
margin-right:auto;
}

footer b{
color:var(--text);
}

footer i{
color:#6366f1;
margin:0 3px;
}

</style>
</head>

<body>

<div class="nav-top">
<button class="btn-nav" onclick="voltar()"><i class="fas fa-arrow-left"></i> Voltar</button>
</div>

<h2>💻 EEMTI DRAGÃO DO MAR </h2>

<div class="grid" id="grid"></div>

<footer>
<p><i class="fas fa-school"></i> <b>EEMTI DRAGÃO DO MAR - L.E.I.</b></p>
<p><i class="fas fa-code"></i> By D.S.Montenegro <i class="fas fa-bolt"></i></p>
</footer>

<script>

const client = supabase.createClient(
"https://fwemutmkbvnriqxxufhx.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3ZW11dG1rYnZucmlxeHh1Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjM2MzMsImV4cCI6MjA4ODczOTYzM30.HCXIoI_r7_yGJntTPIizhrP4apxXV3Ahd6Jk2AkvKas"
)

function voltar(){
window.location.href="painel.html"
}

// TURMA FIXA
function getTurma(pcNome){
const num = parseInt(pcNome.replace("PC",""))

if(num % 3 === 1) return {nome:"1º ANO", classe:"turma1"}
if(num % 3 === 2) return {nome:"2º ANO", classe:"turma2"}
if(num % 3 === 0) return {nome:"3º ANO", classe:"turma3"}
}

// GRID
async function inicializar(){

const { data: pcs } = await client
.from("provas_terminais")
.select("nome")

pcs.sort((a,b)=>parseInt(a.nome.replace("PC","")) - parseInt(b.nome.replace("PC","")))

pcs.forEach(pc=>{

const turma = getTurma(pc.nome)

grid.innerHTML += `
<div class="pc ${turma.classe}" id="card-${pc.nome}">

<!-- ❌ -->
<div class="pc-x" id="x-${pc.nome}">
<i class="fas fa-circle-xmark"></i>
</div>

<i class="fas fa-desktop pc-icon"></i>

<div class="pc-nome">${pc.nome}</div>

<div class="status" id="status-${pc.nome}">---</div>

<div class="pc-aluno" id="aluno-${pc.nome}">---</div>

<div class="pc-turma">${turma.nome}</div>

</div>
`
})

atualizar()

}

// UPDATE
async function atualizar(){

const { data: pcs } = await client
.from("provas_terminais")
.select("*")

for(let pc of pcs){

const card = document.getElementById(`card-${pc.nome}`)
const status = document.getElementById(`status-${pc.nome}`)
const aluno = document.getElementById(`aluno-${pc.nome}`)

card.classList.remove("livre","ocupado")
card.classList.add(pc.status)

status.innerText = pc.status.toUpperCase()

if(pc.aluno_id){

const { data: a } = await client
.from("provas_alunos")
.select("nome")
.eq("id",pc.aluno_id)
.single()

aluno.innerText = a ? a.nome : "---"

}else{
aluno.innerText="---"
}

}

}

inicializar()
setInterval(atualizar,3000)

</script>

</body>
</html>
